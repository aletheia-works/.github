# Tool versions for local work in this repo.
#
# This is the org-wide `.github` repo, so it only needs the toolchain to
# run the org-level OpenTofu under `infra/github-org/` and to lint the
# reusable workflows. Per-repo language runtimes (python, ruby, php,
# rust, …) live in each consumer repo's own `mise.toml` — see
# vivarium/mise.toml for the richer pin set.

[tools]
bun = "1"
opentofu = "1.8.0"

[tasks."tofu:init"]
description = "Initialize the OpenTofu working directory"
run = "tofu init"

[tasks."tofu:validate"]
description = "Validate OpenTofu configuration"
run = "tofu validate"

[tasks."tofu:fmt"]
description = "Format OpenTofu files in place"
run = "tofu fmt -recursive"

[tasks."tofu:fmt-check"]
description = "Check OpenTofu formatting without writing changes"
run = "tofu fmt -check -recursive"

[tasks."lint:install"]
description = "Install commitlint dev dependencies"
run = "bun add -d @commitlint/cli @commitlint/config-conventional"

[tasks."lint:last"]
description = "Lint the last commit message"
run = "bun commitlint --last --verbose"

[tasks."lint:pr"]
description = "Lint PR commits — pass flags as args, e.g.: mise run lint:pr -- --from SHA --to SHA --verbose"
run = """
#!/usr/bin/env bash
bun commitlint "$@"
"""
