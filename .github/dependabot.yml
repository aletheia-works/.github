# Dependabot configuration for the aletheia-works/.github repo.
#
# Mirrors vivarium/.github/dependabot.yml so caller repos and this repo
# track the same cadence and label taxonomy. The primary job here is to
# keep third-party action SHA pins current — in particular the ones used
# inside the reusable terraform-plan/apply workflows.

version: 2
updates:
  # ─── GitHub Actions ──────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Tokyo"
    labels:
      - "type: chore"
      - "scope: ci"
      - "ai: generated"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    # Skip non-security major-version updates — major bumps need targeted
    # human/AI review rather than automated merging.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  # ─── OpenTofu providers ──────────────────────
  - package-ecosystem: "terraform"
    directory: "/infra/github-org"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Tokyo"
    labels:
      - "type: chore"
      - "scope: infra"
      - "ai: generated"
    commit-message:
      prefix: "chore(infra)"
      include: "scope"
    open-pull-requests-limit: 3
