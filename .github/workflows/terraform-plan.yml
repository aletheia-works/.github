name: Terraform Plan

# Reusable workflow that runs `tofu plan` against an OpenTofu module and
# posts the diff as a PR comment. Designed to be called from any repo in
# the org whose configuration lives under `infra/<dir>/`.
#
# Caller example (vivarium/.github/workflows/terraform-plan.yml):
#
#   jobs:
#     plan:
#       uses: aletheia-works/.github/.github/workflows/terraform-plan.yml@main
#       with:
#         working_directory: infra/github
#       secrets: inherit
#
# State is still per-repo: the `terraform-state` artifact, the
# `LATEST_APPLY_RUN_ID` repo variable, and the `terraform-state`
# concurrency group are all evaluated in the caller's context, so the
# org's state and vivarium's state never intersect.

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing the OpenTofu configuration."
        type: string
        required: false
        default: infra/github-org
      tofu_version:
        description: "OpenTofu version to install."
        type: string
        required: false
        default: "1.8.0"
      tfvar_assignments:
        description: "Extra -var=key=value arguments appended to tofu plan, one per line. github_owner is preset from the repository owner and must not be repeated here."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  # `pull-requests: write` is required for the inline comment step on
  # same-repo PRs. Fork PRs are downgraded to read by GitHub regardless
  # of what we declare here, so the comment step is gated on
  # `head.repo.full_name == github.repository`. The plan output is also
  # written to the run's Step Summary so fork-PR authors can still read
  # the plan from the Actions tab without write tokens.
  pull-requests: write
  # Required to read the state artifact from a prior workflow run.
  actions: read

# Avoid concurrent runs that could corrupt the state. Group name is
# global to the caller repo, so plan in the org repo and plan in vivarium
# do not block each other.
concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  plan:
    name: OpenTofu Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: ${{ inputs.tofu_version }}
          tofu_wrapper: false

      # Download the latest state artifact produced by a prior apply run.
      # Allowed to fail on the very first run when no artifact exists yet.
      - name: Download state artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: terraform-state
          path: ${{ inputs.working_directory }}/
          run-id: ${{ vars.LATEST_APPLY_RUN_ID || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tofu Init
        run: tofu init
        env:
          GITHUB_TOKEN: ${{ secrets.TF_TOKEN_GITHUB }}

      - name: Tofu Format Check
        id: fmt
        run: tofu fmt -check -recursive
        continue-on-error: true

      - name: Tofu Validate
        id: validate
        run: tofu validate

      - name: Tofu Plan
        id: plan
        run: |
          extra_args=""
          if [ -n "${TFVAR_ASSIGNMENTS}" ]; then
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              extra_args="${extra_args} -var=${line}"
            done <<< "${TFVAR_ASSIGNMENTS}"
          fi
          tofu plan -no-color -out=tfplan \
            -var="github_owner=${REPO_OWNER}" \
            ${extra_args} 2>&1 | tee plan_output.txt
          # Propagate tofu's exit code as the step's exit so
          # steps.plan.outcome accurately reflects failure. `continue-on-error`
          # below still lets the PR-comment step run afterwards.
          exit "${PIPESTATUS[0]}"
        env:
          GITHUB_TOKEN: ${{ secrets.TF_TOKEN_GITHUB }}
          REPO_OWNER: ${{ github.repository_owner }}
          TFVAR_ASSIGNMENTS: ${{ inputs.tfvar_assignments }}
        continue-on-error: true

      # Always-visible plan summary, including for fork PRs where the
      # comment step below is skipped because GITHUB_TOKEN is read-only.
      - name: Write plan to Step Summary
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          PLAN_OUTPUT_PATH: ${{ inputs.working_directory }}/plan_output.txt
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
          FMT_STATUS: ${{ steps.fmt.outcome }}
          VALIDATE_STATUS: ${{ steps.validate.outcome }}
          PLAN_STATUS: ${{ steps.plan.outcome }}
        run: |
          fmt_icon='✅ Passed'; [ "$FMT_STATUS" != 'success' ] && fmt_icon='⚠️ Formatting issues'
          validate_icon='✅ Passed'; [ "$VALIDATE_STATUS" != 'success' ] && validate_icon='❌ Failed'
          plan_icon='✅ Ready to apply'; [ "$PLAN_STATUS" != 'success' ] && plan_icon='❌ Failed'
          {
            echo "## 📋 OpenTofu Plan Result (\`${WORKING_DIRECTORY}\`)"
            echo
            echo "| Step | Status |"
            echo "|---|---|"
            echo "| Format | ${fmt_icon} |"
            echo "| Validate | ${validate_icon} |"
            echo "| Plan | ${plan_icon} |"
            echo
            echo '<details><summary>📄 Plan Output</summary>'
            echo
            echo '```terraform'
            if [ -f "$PLAN_OUTPUT_PATH" ]; then
              # Truncate at the same 60 KB cap the PR-comment step uses.
              head -c 60000 "$PLAN_OUTPUT_PATH"
              if [ "$(wc -c < "$PLAN_OUTPUT_PATH")" -gt 60000 ]; then
                echo
                echo '...(output truncated)...'
              fi
            else
              echo '(plan_output.txt was not produced — see earlier steps)'
            fi
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post Plan to PR
        # Skip on fork PRs: `pull_request` from a fork downgrades
        # GITHUB_TOKEN to read-only regardless of the `permissions:` block,
        # so this step would 403. The Step Summary above carries the
        # same content for fork-PR reviewers.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        env:
          PLAN_OUTPUT_PATH: ${{ inputs.working_directory }}/plan_output.txt
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
          FMT_STATUS: ${{ steps.fmt.outcome }}
          VALIDATE_STATUS: ${{ steps.validate.outcome }}
          PLAN_STATUS: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(process.env.PLAN_OUTPUT_PATH, 'utf8');

            // Truncate overly long output so the PR comment stays within the API limit.
            const maxLength = 60000;
            const truncated = planOutput.length > maxLength
              ? planOutput.slice(0, maxLength) + '\n\n...(output truncated)...'
              : planOutput;

            const fmtStatus = process.env.FMT_STATUS;
            const validateStatus = process.env.VALIDATE_STATUS;
            const planStatus = process.env.PLAN_STATUS;
            const workingDir = process.env.WORKING_DIRECTORY;

            // Marker scoped by working_directory so one PR can carry plan
            // comments for multiple modules without collision.
            const marker = `<!-- tofu-plan:${workingDir} -->`;

            const body = `## 📋 OpenTofu Plan Result (\`${workingDir}\`)

            | Step | Status |
            |---|---|
            | Format | ${fmtStatus === 'success' ? '✅ Passed' : '⚠️ Formatting issues'} |
            | Validate | ${validateStatus === 'success' ? '✅ Passed' : '❌ Failed'} |
            | Plan | ${planStatus === 'success' ? '✅ Ready to apply' : '❌ Failed'} |

            <details>
            <summary>📄 Plan Output</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            ---
            *Triggered by: @${context.actor} | Commit: ${context.sha.slice(0, 7)}*
            ${marker}
            `;

            // Update the existing bot comment for this module if one exists,
            // otherwise create a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome != 'success'
        run: exit 1
