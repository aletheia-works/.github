name: Seed Terraform State

# One-off and disaster-recovery workflow: accepts a base64-encoded state
# file and publishes it as the `terraform-state` artifact, then points
# LATEST_APPLY_RUN_ID at this run so the Terraform Plan/Apply callers
# pick it up.
#
# Use cases:
#   1. Bootstrap — publish the initial state produced by a local
#      `tofu import` / `tofu apply` before the first CI apply.
#   2. Recovery — restore state from a local backup if the CI-side state
#      is corrupted.
#
# Dispatch (default — seeds the org-settings module):
#   cd infra/github-org
#   STATE_B64=$(base64 -w0 terraform.tfstate)
#   gh workflow run seed-state.yml \
#     --repo aletheia-works/.github \
#     -f state_b64="$STATE_B64"
#
# Dispatch (alternate module — e.g. .github repo settings):
#   cd infra/dotgithub
#   STATE_B64=$(base64 -w0 terraform.tfstate)
#   gh workflow run seed-state.yml \
#     --repo aletheia-works/.github \
#     -f state_b64="$STATE_B64" \
#     -f state_artifact_name=terraform-state-dotgithub \
#     -f state_run_id_variable=LATEST_APPLY_RUN_ID_DOTGITHUB
#
# Security note: the state_b64 input is visible in the workflow run logs.
# The org-settings state file contains organization IDs and ETags but no
# authentication material, so logging is acceptable. Do not use this
# workflow to seed states that contain secrets.

on:
  workflow_dispatch:
    inputs:
      state_b64:
        description: 'Base64-encoded terraform.tfstate (use: base64 -w0 terraform.tfstate)'
        required: true
        type: string
      state_artifact_name:
        description: "Artifact name to publish under. Match the target module's caller workflow."
        required: false
        type: string
        default: terraform-state
      state_run_id_variable:
        description: "Repo variable to point at this run-id. Match the target module's caller workflow."
        required: false
        type: string
        default: LATEST_APPLY_RUN_ID

permissions:
  contents: read
  actions: write

# Share the concurrency group with plan/apply (keyed by artifact name) so
# seeding cannot race the module it targets.
concurrency:
  group: ${{ inputs.state_artifact_name }}
  cancel-in-progress: false

jobs:
  seed:
    name: Seed terraform-state artifact
    runs-on: ubuntu-latest

    steps:
      - name: Decode state
        run: |
          mkdir -p ./state
          printf '%s' "${{ inputs.state_b64 }}" | base64 -d > ./state/terraform.tfstate
          size=$(stat -c%s ./state/terraform.tfstate)
          echo "Decoded state size: ${size} bytes"
          # Sanity check: the file must be valid JSON with a non-empty resources list.
          if ! jq -e '.resources | length > 0' ./state/terraform.tfstate >/dev/null 2>&1; then
            echo "::error::Decoded state has no resources. Refusing to seed."
            exit 1
          fi
          resource_count=$(jq '.resources | length' ./state/terraform.tfstate)
          echo "Resources in state: ${resource_count}"

      - name: Upload terraform-state artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.state_artifact_name }}
          path: ./state/terraform.tfstate
          retention-days: 90
          overwrite: true

      # Point the run-id repo variable at this run so plan/apply callers
      # download the artifact published above. Uses TF_TOKEN_GITHUB because
      # the default GITHUB_TOKEN lacks variables:write permission.
      - name: Point run-id variable at this run
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        env:
          STATE_RUN_ID_VARIABLE: ${{ inputs.state_run_id_variable }}
        with:
          github-token: ${{ secrets.TF_TOKEN_GITHUB }}
          script: |
            const name = process.env.STATE_RUN_ID_VARIABLE;
            try {
              await github.rest.actions.createRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                value: String(context.runId),
              });
            } catch (e) {
              await github.rest.actions.updateRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                value: String(context.runId),
              });
            }

      - name: Summary
        env:
          STATE_ARTIFACT_NAME: ${{ inputs.state_artifact_name }}
          STATE_RUN_ID_VARIABLE: ${{ inputs.state_run_id_variable }}
        run: |
          {
            echo "### Seed complete"
            echo
            echo "- Artifact: \`${STATE_ARTIFACT_NAME}\` (uploaded from run \`${{ github.run_id }}\`)"
            echo "- \`${STATE_RUN_ID_VARIABLE}\` set to \`${{ github.run_id }}\`"
            echo "- Next Terraform Plan/Apply run targeting this module will download the state."
          } >> "$GITHUB_STEP_SUMMARY"
