name: Org Terraform Plan

# Thin caller for the reusable terraform-plan workflow. Runs on PRs that
# touch this repo's own `infra/github-org/` OpenTofu module. The actual
# plan logic lives in terraform-plan.yml (same repo) so vivarium and
# other org repos can reuse it.

on:
  # Use `pull_request_target` so fork PRs see plan output too — without
  # it, `pull_request` from a fork strips secrets (TF_TOKEN_GITHUB) and
  # gives a read-only GITHUB_TOKEN, leaving plan unable to authenticate
  # or comment back. The reusable workflow checks out the PR's head SHA
  # explicitly so the diff is what's planned. See the security note in
  # terraform-plan.yml's checkout step.
  pull_request_target:
    paths:
      - 'infra/github-org/**'
      - '.github/workflows/terraform-plan.yml'
      - '.github/workflows/org-terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  plan:
    if: github.repository_owner == 'aletheia-works'
    # Local reference is used (./…) so the caller in this repo always
    # matches the PR's version of the reusable workflow. External callers
    # (e.g. vivarium) pin to `@main` or a SHA instead.
    uses: ./.github/workflows/terraform-plan.yml
    with:
      working_directory: infra/github-org
      tfvar_assignments: |
        billing_email=${{ vars.BILLING_EMAIL }}
    secrets: inherit
