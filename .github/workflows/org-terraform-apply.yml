name: Org Terraform Apply

# Thin caller for the reusable terraform-apply workflow. Triggered when
# changes under `infra/github-org/` land on main, or by manual dispatch.

on:
  push:
    branches:
      - main
    paths:
      - 'infra/github-org/**'
      - '.github/workflows/terraform-apply.yml'
      - '.github/workflows/org-terraform-apply.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  apply:
    # Skip on forks. Apply mutates the real org and depends on repo-scoped
    # secrets/variables (TF_TOKEN_GITHUB, LATEST_APPLY_RUN_ID, BILLING_EMAIL)
    # that don't exist in forks, so an upstream-sync push to a fork's main
    # would otherwise trigger a guaranteed failure run.
    if: github.repository_owner == 'aletheia-works'
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: infra/github-org
      tfvar_assignments: |
        billing_email=${{ vars.BILLING_EMAIL }}
    secrets: inherit
