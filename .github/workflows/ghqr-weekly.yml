name: GHQR Weekly Org Scan

# Microsoft GitHub Quick Review (ghqr) で aletheia-works org 配下を週次スキャン。
# Excel / JSON / Markdown レポートを actions artifact として保存する。
#
# 必要な secret: TF_TOKEN_GITHUB
#   既存の OpenTofu 用 PAT (terraform-apply.yml が使う TF_TOKEN_GITHUB) を
#   そのまま流用する。ghqr は読み取り専用ツールなので本来はもっと弱い
#   fine-grained PAT で十分だが、PAT 総数を増やさない運用判断としてこの
#   一本に集約する。
#   (GitHub Actions 組み込みの GITHUB_TOKEN は repo-scoped で
#    /orgs/{org}/* API に届かないため使えない)

on:
  # 毎週月曜 00:00 UTC = 09:00 JST。
  # terraform-state-backup の 03:00 UTC と被らない時間に置く。
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ghqr-weekly
  cancel-in-progress: false

jobs:
  scan:
    name: Scan aletheia-works
    runs-on: ubuntu-latest
    # フォーク対策: schedule トリガーは fork 側でも発火するが、
    # fork は GHQR_TOKEN secret を持たないので無駄に失敗する。
    if: github.repository_owner == 'aletheia-works'

    steps:
      - name: Install ghqr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 公式 install.sh は jq/unzip/wget を要求する。
          # ubuntu-latest には全て揃っているため curl で直接実行。
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/microsoft/ghqr/main/scripts/install.sh)"
          ./ghqr --version

      - name: Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.TF_TOKEN_GITHUB }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +'%Y%m%d')"
          ./ghqr scan -o aletheia-works -n "aletheia-works_${STAMP}"

      - name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghqr-report
          path: |
            aletheia-works_*.xlsx
            aletheia-works_*.json
            aletheia-works_*.md
          retention-days: 90
          if-no-files-found: error
