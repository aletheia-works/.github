name: GHQR Weekly Org Scan

# Run Microsoft GitHub Quick Review (ghqr) against the aletheia-works
# organization on a weekly cadence and on demand. The xlsx / json / md
# reports are stored as Actions artifacts.
#
# Required secret: TF_TOKEN_GITHUB
#   Reuses the existing OpenTofu PAT (the same one terraform-apply.yml
#   reads as TF_TOKEN_GITHUB). ghqr only reads, so a weaker fine-grained
#   PAT would be ideal in theory, but consolidating onto a single PAT
#   keeps the maintainer's PAT count from growing as the toolset does.
#   (The built-in GITHUB_TOKEN is repo-scoped and can't reach the
#   /orgs/{org}/* endpoints ghqr needs.)

on:
  # Every Monday at 00:00 UTC = 09:00 JST. Picked to not overlap with
  # terraform-state-backup, which runs at 03:00 UTC the same day.
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ghqr-weekly
  cancel-in-progress: false

jobs:
  scan:
    name: Scan aletheia-works
    runs-on: ubuntu-latest
    # Skip on forks: the schedule trigger fires in any fork that has
    # Actions enabled, but forks do not carry the TF_TOKEN_GITHUB secret
    # so the run would only generate noise.
    if: github.repository_owner == 'aletheia-works'

    steps:
      - name: Install ghqr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The upstream install.sh expects jq/unzip/wget. ubuntu-latest
          # ships all three, so we can stream it through bash directly.
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/microsoft/ghqr/main/scripts/install.sh)"
          ./ghqr --version

      - name: Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.TF_TOKEN_GITHUB }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +'%Y%m%d')"
          ./ghqr scan -o aletheia-works -n "aletheia-works_${STAMP}"

      - name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghqr-report
          path: |
            aletheia-works_*.xlsx
            aletheia-works_*.json
            aletheia-works_*.md
          retention-days: 90
          if-no-files-found: error
